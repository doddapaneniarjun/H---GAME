<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Snake</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #0c0b24;
    display: grid;
    place-items: center;
    font-family: ui-monospace, monospace;
    color: #f1ead9;
    overflow: hidden;
  }
  #wrap { text-align: center; }
  canvas {
    background: #14133a;
    border: 2px solid #45c4a0;
    border-radius: 4px;
    max-width: 92vw;
    max-height: 78vh;
    image-rendering: pixelated;
  }
  #hud {
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-size: 12px;
    margin: 10px 0 0;
    color: #ffc531;
  }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="400" height="400"></canvas>
  <p id="hud">Score 0 — arrows or WASD</p>
</div>
<script>
const CELL = 20;
const COLS = 20;
const ROWS = 20;
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const hud = document.getElementById("hud");

let snake, dir, nextDir, food, score, dead, tick;

function reset() {
  snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  dead = false;
  placeFood();
  hud.textContent = "Score 0 — arrows or WASD";
}

function placeFood() {
  do {
    food = { x: (Math.random() * COLS) | 0, y: (Math.random() * ROWS) | 0 };
  } while (snake.some((s) => s.x === food.x && s.y === food.y));
}

function step() {
  if (dead) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  const hitWall = head.x < 0 || head.y < 0 || head.x >= COLS || head.y >= ROWS;
  const hitSelf = snake.some((s) => s.x === head.x && s.y === head.y);
  if (hitWall || hitSelf) {
    dead = true;
    hud.textContent = "Game over — score " + score + " — press space";
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    hud.textContent = "Score " + score + " — arrows or WASD";
    placeFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.fillStyle = "#14133a";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#e2483d";
  ctx.fillRect(food.x * CELL + 3, food.y * CELL + 3, CELL - 6, CELL - 6);

  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? "#ffc531" : "#45c4a0";
    ctx.fillRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
  });
}

const KEYS = {
  ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 },
  ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 },
  ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 },
  ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 },
};

window.addEventListener("keydown", (e) => {
  if (e.key === " ") {
    if (dead) reset();
    e.preventDefault();
    return;
  }
  const want = KEYS[e.key] || KEYS[e.key.toLowerCase()];
  if (!want) return;
  e.preventDefault();
  // No instant 180° turns.
  if (want.x === -dir.x && want.y === -dir.y) return;
  nextDir = want;
});

reset();
tick = setInterval(() => { step(); draw(); }, 110);
draw();
</script>
</body>
</html>
